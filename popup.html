<!DOCTYPE html>
<html>
<body style="width: 250px; font-family: Arial; padding: 10px; background: #1e1e1e; color: white;">
  <h4>Pengaturan Komando Groq</h4>
  <input type="password" id="apiKey" placeholder="Masukkan Groq API Key" style="width: 90%; padding: 5px; margin-bottom: 10px;">
  <div style="display: flex; gap: 5px;">
    <button id="saveBtn" style="flex: 1; padding: 8px; background: #10b981; color: white; border: none; font-weight: bold; cursor: pointer;">Simpan</button>
    <button id="deleteBtn" style="display: none; flex: 1; padding: 8px; background: #ef4444; color: white; border: none; font-weight: bold; cursor: pointer;">Hapus</button>
  </div>
  <div id="status" style="margin-top: 10px; font-size: 11px; color: #fbbf24;"></div>
  <script src="popup.js"></script>
</body>
</html>
